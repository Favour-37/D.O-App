<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7C4DFF">
    <title>Dominion Outreach – Intimacy with the Father</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dxiefklmt/image/upload/q_auto,f_auto/v1774102552/Dominion_Outreach_ft0cc0.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F7;
            --surface-dark: #E8E8ED;
            --text: #1D1C1E;
            --text-secondary: #86868B;
            --primary: #7C4DFF;
            --primary-light: #B47CFF;
            --secondary: #00C9A7;
            --border: rgba(0,0,0,0.05);
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 32px rgba(0,0,0,0.1);
            --radius: 24px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --bg: #000000;
            --surface: #1C1C1E;
            --surface-dark: #2C2C2E;
            --text: #FFFFFF;
            --text-secondary: #98989D;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Header */
        .app-header {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        body.dark .app-header {
            background: rgba(0,0,0,0.8);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
        }
        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
            transition: var(--transition);
        }
        .theme-toggle:hover {
            transform: rotate(15deg);
        }

        /* Bottom Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            z-index: 100;
        }
        .tab-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: var(--transition);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .tab-btn i {
            font-size: 1.4rem;
        }
        .tab-btn.active {
            color: var(--primary);
            background: rgba(124,77,255,0.1);
        }

        /* Main content */
        .main-content {
            padding: 20px 16px 80px;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* Buttons & inputs */
        button, .btn {
            background: var(--primary);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        button:active {
            transform: scale(0.98);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
        .post-card {
            overflow: hidden;
        }
        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 0;
        }
        .post-media img, .post-media video {
            width: 100%;
            display: block;
        }
        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            color: var(--text-secondary);
        }
        .post-stats button {
            background: none;
            border: none;
            color: inherit;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .comment-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .comment {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .comment strong {
            color: var(--primary);
        }
        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .comment-input input {
            flex: 1;
            margin-bottom: 0;
        }
        .admin-form {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="logo-area">
            <img src="https://res.cloudinary.com/dxiefklmt/image/upload/q_auto,f_auto/v1774102552/Dominion_Outreach_ft0cc0.png" class="logo-img" alt="Dominion Outreach">
            <span class="app-title">Dominion Outreach</span>
        </div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <div class="main-content" id="mainContent">
        <!-- Dynamic content injected by JS -->
        <div class="loader">Loading...</div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="tab-btn" data-tab="feed"><i class="fas fa-newspaper"></i><span>Feed</span></button>
        <button class="tab-btn" data-tab="prayer"><i class="fas fa-hands-praying"></i><span>Prayer</span></button>
        <button class="tab-btn" data-tab="journal"><i class="fas fa-book"></i><span>Journal</span></button>
        <button class="tab-btn" data-tab="settings"><i class="fas fa-cog"></i><span>Settings</span></button>
    </div>

    <script>
        // ---------- Cloudinary config ----------
        const CLOUD_NAME = "dxiefklmt";          // your cloud name
        const UPLOAD_PRESET = "dominion_app";    // unsigned upload preset – create in Cloudinary dashboard

        // ---------- Theme ----------
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            if (theme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            localStorage.setItem('theme', theme);
            const icon = themeToggle.querySelector('i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') setTheme('dark');
        else setTheme('light');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });

        // ---------- Data models (localStorage keys) ----------
        const STORAGE = {
            posts: 'dominion_posts',
            prayers: 'dominion_prayers',
            journal: 'dominion_journal',
            dailyRotation: 'dominion_daily_index'
        };

        // Example daily scriptures (you can edit/add more)
        const dailyVerses = [
            { verse: "Jeremiah 29:11", text: "'For I know the plans I have for you,' declares the LORD, 'plans to prosper you and not to harm you, plans to give you hope and a future.'" },
            { verse: "Philippians 4:13", text: "I can do all things through Christ who strengthens me." },
            { verse: "Isaiah 40:31", text: "But those who hope in the LORD will renew their strength. They will soar on wings like eagles." },
            { verse: "Romans 8:28", text: "And we know that in all things God works for the good of those who love him, who have been called according to his purpose." },
            { verse: "Psalm 23:4", text: "Even though I walk through the darkest valley, I will fear no evil, for you are with me." }
        ];

        function getDailyVerse() {
            let index = parseInt(localStorage.getItem(STORAGE.dailyRotation) || '0');
            const verse = dailyVerses[index % dailyVerses.length];
            localStorage.setItem(STORAGE.dailyRotation, (index + 1) % dailyVerses.length);
            return verse;
        }

        // Initialize default posts if empty
        function initData() {
            if (!localStorage.getItem(STORAGE.posts)) {
                const defaultPost = {
                    id: Date.now(),
                    title: "Welcome to Dominion Outreach",
                    content: "This is a place of intimacy with the Father. Share your journey, grow in faith, and encourage one another.",
                    mediaUrl: null,
                    mediaType: null,
                    timestamp: new Date().toISOString(),
                    likes: 0,
                    comments: []
                };
                localStorage.setItem(STORAGE.posts, JSON.stringify([defaultPost]));
            }
            if (!localStorage.getItem(STORAGE.prayers)) {
                localStorage.setItem(STORAGE.prayers, JSON.stringify([]));
            }
            if (!localStorage.getItem(STORAGE.journal)) {
                localStorage.setItem(STORAGE.journal, JSON.stringify([]));
            }
        }
        initData();

        function getPosts() { return JSON.parse(localStorage.getItem(STORAGE.posts)); }
        function savePosts(posts) { localStorage.setItem(STORAGE.posts, JSON.stringify(posts)); }
        function getPrayers() { return JSON.parse(localStorage.getItem(STORAGE.prayers)); }
        function savePrayers(prayers) { localStorage.setItem(STORAGE.prayers, JSON.stringify(prayers)); }
        function getJournal() { return JSON.parse(localStorage.getItem(STORAGE.journal)); }
        function saveJournal(entries) { localStorage.setItem(STORAGE.journal, JSON.stringify(entries)); }

        // Helper: escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ---------- Tab Rendering ----------
        let activeTab = 'home';

        function renderHome() {
            const verse = getDailyVerse();
            const html = `
                <div class="card">
                    <h3>🌿 Daily Verse</h3>
                    <p style="font-style: italic; margin: 12px 0;">“${escapeHtml(verse.text)}”</p>
                    <p style="text-align: right;">— ${escapeHtml(verse.verse)}</p>
                </div>
                <div class="card">
                    <h3>🙏 Word of Encouragement</h3>
                    <p>Let your faith be bigger than your fears. God is with you every step of the way.</p>
                </div>
                <div class="card">
                    <h3>🎧 Today's Worship</h3>
                    <p><i class="fas fa-music"></i> “Way Maker” – Sinach</p>
                    <p><i class="fab fa-youtube"></i> <a href="#" style="color: var(--primary);">Listen on YouTube</a></p>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // Feed: list posts, add new post form, like/comment functionality
        function renderFeed() {
            const posts = getPosts();
            let html = `
                <div class="admin-form">
                    <h3>✍️ Share a New Devotional</h3>
                    <input type="text" id="newPostTitle" placeholder="Title">
                    <textarea id="newPostContent" rows="4" placeholder="Scripture / Reflection"></textarea>
                    <input type="file" id="newPostMedia" accept="image/*,video/*">
                    <button id="publishPostBtn">Publish Post</button>
                    <div id="uploadStatus" style="margin-top: 8px; font-size: 0.8rem;"></div>
                </div>
                <div id="postsList"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;

            const postsDiv = document.getElementById('postsList');
            if (posts.length === 0) {
                postsDiv.innerHTML = '<div class="card">No posts yet. Create the first one!</div>';
            } else {
                let postsHtml = '';
                posts.forEach(post => {
                    const mediaHtml = post.mediaUrl ? 
                        (post.mediaType === 'image' ? `<div class="post-media"><img src="${post.mediaUrl}" alt="post image" loading="lazy"></div>` :
                        `<div class="post-media"><video controls src="${post.mediaUrl}"></video></div>`) : '';
                    const commentsHtml = (post.comments || []).map(c => `
                        <div class="comment"><strong>${escapeHtml(c.name)}</strong>: ${escapeHtml(c.text)}</div>
                    `).join('');
                    postsHtml += `
                        <div class="card post-card" data-id="${post.id}">
                            <h3>${escapeHtml(post.title)}</h3>
                            <p style="color: var(--text-secondary); font-size: 0.75rem;">${new Date(post.timestamp).toLocaleDateString()}</p>
                            <div class="post-content">${escapeHtml(post.content)}</div>
                            ${mediaHtml}
                            <div class="post-stats">
                                <button class="like-post" data-id="${post.id}"><i class="far fa-heart"></i> ${post.likes}</button>
                                <button class="toggle-comments" data-id="${post.id}"><i class="far fa-comment"></i> ${(post.comments || []).length}</button>
                            </div>
                            <div class="comment-section hidden" id="comments-${post.id}">
                                <div class="comments-list">${commentsHtml}</div>
                                <div class="comment-input">
                                    <input type="text" placeholder="Write a comment..." id="commentInput-${post.id}">
                                    <button class="submit-comment" data-id="${post.id}">Post</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                postsDiv.innerHTML = postsHtml;
            }

            // New post with Cloudinary upload
            document.getElementById('publishPostBtn')?.addEventListener('click', async () => {
                const title = document.getElementById('newPostTitle').value.trim();
                const content = document.getElementById('newPostContent').value.trim();
                if (!title || !content) { alert('Please fill title and content'); return; }
                const file = document.getElementById('newPostMedia').files[0];
                let mediaUrl = null, mediaType = null;
                const statusDiv = document.getElementById('uploadStatus');
                if (file) {
                    statusDiv.innerText = 'Uploading media...';
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);
                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                        const data = await res.json();
                        mediaUrl = data.secure_url;
                        mediaType = file.type.startsWith('image/') ? 'image' : 'video';
                        statusDiv.innerText = 'Upload complete!';
                    } catch (err) {
                        statusDiv.innerText = 'Upload failed, media not attached';
                        console.error(err);
                    }
                }
                const posts = getPosts();
                const newPost = {
                    id: Date.now(),
                    title,
                    content,
                    mediaUrl,
                    mediaType,
                    timestamp: new Date().toISOString(),
                    likes: 0,
                    comments: []
                };
                posts.unshift(newPost);
                savePosts(posts);
                renderFeed();
            });

            // Like / Comment event delegation
            document.addEventListener('click', (e) => {
                if (e.target.closest('.like-post')) {
                    const btn = e.target.closest('.like-post');
                    const id = parseInt(btn.dataset.id);
                    const posts = getPosts();
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        post.likes = (post.likes || 0) + 1;
                        savePosts(posts);
                        renderFeed();
                    }
                }
                if (e.target.closest('.toggle-comments')) {
                    const btn = e.target.closest('.toggle-comments');
                    const id = btn.dataset.id;
                    const sec = document.getElementById(`comments-${id}`);
                    sec.classList.toggle('hidden');
                }
                if (e.target.closest('.submit-comment')) {
                    const btn = e.target.closest('.submit-comment');
                    const id = parseInt(btn.dataset.id);
                    const input = document.getElementById(`commentInput-${id}`);
                    const text = input.value.trim();
                    if (!text) return;
                    const name = "You"; // local user, no login
                    const posts = getPosts();
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        post.comments = post.comments || [];
                        post.comments.push({ id: Date.now(), name, text, timestamp: new Date().toISOString() });
                        savePosts(posts);
                        renderFeed();
                    }
                }
            });
        }

        // Prayer Wall
        function renderPrayerWall() {
            const prayers = getPrayers();
            let html = `
                <div class="card">
                    <h3>🕯️ Submit a Prayer Request</h3>
                    <input type="text" id="prayerName" placeholder="Your name (optional)">
                    <textarea id="prayerText" rows="3" placeholder="What can we pray about?"></textarea>
                    <button id="submitPrayerBtn">Submit</button>
                </div>
                <div id="prayersList"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            const listDiv = document.getElementById('prayersList');
            if (prayers.length === 0) {
                listDiv.innerHTML = '<div class="card">No prayer requests yet. Be the first to share.</div>';
            } else {
                let prayersHtml = '';
                prayers.forEach(p => {
                    prayersHtml += `
                        <div class="card">
                            <div><strong>${escapeHtml(p.name) || 'Anonymous'}</strong></div>
                            <p>${escapeHtml(p.text)}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                                <span style="font-size: 0.75rem;">${new Date(p.timestamp).toLocaleDateString()}</span>
                                <button class="pray-for" data-id="${p.id}">🙏 Prayed (${p.prayCount || 0})</button>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = prayersHtml;
            }

            document.getElementById('submitPrayerBtn')?.addEventListener('click', () => {
                const name = document.getElementById('prayerName').value.trim();
                const text = document.getElementById('prayerText').value.trim();
                if (!text) return;
                const prayers = getPrayers();
                prayers.unshift({
                    id: Date.now(),
                    name: name || 'Anonymous',
                    text,
                    timestamp: new Date().toISOString(),
                    prayCount: 0
                });
                savePrayers(prayers);
                renderPrayerWall();
            });

            document.addEventListener('click', (e) => {
                if (e.target.closest('.pray-for')) {
                    const btn = e.target.closest('.pray-for');
                    const id = parseInt(btn.dataset.id);
                    const prayers = getPrayers();
                    const prayer = prayers.find(p => p.id === id);
                    if (prayer) {
                        prayer.prayCount = (prayer.prayCount || 0) + 1;
                        savePrayers(prayers);
                        renderPrayerWall();
                    }
                }
            });
        }

        // Journal
        function renderJournal() {
            let entries = getJournal();
            let html = `
                <div class="admin-form">
                    <h3>📔 Write in Your Journal</h3>
                    <input type="text" id="journalTitle" placeholder="Title">
                    <textarea id="journalContent" rows="4" placeholder="Your thoughts, prayers, reflections..."></textarea>
                    <button id="addJournalEntry">Save Entry</button>
                </div>
                <div id="journalList"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            const listDiv = document.getElementById('journalList');
            if (entries.length === 0) {
                listDiv.innerHTML = '<div class="card">No journal entries yet. Write your first one!</div>';
            } else {
                let entriesHtml = '';
                entries.slice().reverse().forEach(entry => {
                    entriesHtml += `
                        <div class="card">
                            <h3>${escapeHtml(entry.title)}</h3>
                            <p style="font-size: 0.75rem; color: var(--text-secondary);">${new Date(entry.timestamp).toLocaleString()}</p>
                            <p>${escapeHtml(entry.content)}</p>
                            <button class="delete-journal" data-id="${entry.id}" style="margin-top: 8px; background: none; color: var(--text-secondary); padding: 4px 12px;">Delete</button>
                        </div>
                    `;
                });
                listDiv.innerHTML = entriesHtml;
            }

            document.getElementById('addJournalEntry')?.addEventListener('click', () => {
                const title = document.getElementById('journalTitle').value.trim();
                const content = document.getElementById('journalContent').value.trim();
                if (!title || !content) return alert('Please fill both title and content');
                const entries = getJournal();
                entries.push({
                    id: Date.now(),
                    title,
                    content,
                    timestamp: new Date().toISOString()
                });
                saveJournal(entries);
                renderJournal();
            });

            document.addEventListener('click', (e) => {
                if (e.target.closest('.delete-journal')) {
                    const id = parseInt(e.target.closest('.delete-journal').dataset.id);
                    let entries = getJournal();
                    entries = entries.filter(e => e.id !== id);
                    saveJournal(entries);
                    renderJournal();
                }
            });
        }

        // Settings
        function renderSettings() {
            const html = `
                <div class="card">
                    <h3>⚙️ App Settings</h3>
                    <button id="clearAllData" style="background: #FF3B30; margin-top: 16px;">Clear All Local Data</button>
                    <p style="margin-top: 12px; font-size: 0.8rem;">This will delete all posts, prayers, and journal entries.</p>
                </div>
                <div class="card">
                    <h3>📲 Install App</h3>
                    <p>On supported browsers, click “Add to Home Screen” from the share menu.</p>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('clearAllData')?.addEventListener('click', () => {
                if (confirm('WARNING: This will delete ALL your data. Are you sure?')) {
                    localStorage.clear();
                    initData();
                    alert('All data cleared. App will reload.');
                    window.location.reload();
                }
            });
        }

        // Tab switching
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            if (tab === 'home') renderHome();
            else if (tab === 'feed') renderFeed();
            else if (tab === 'prayer') renderPrayerWall();
            else if (tab === 'journal') renderJournal();
            else if (tab === 'settings') renderSettings();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // initial load
        switchTab('home');

        // Service Worker for offline caching (make app installable)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed', err));
            // dynamic service worker creation if not exists
            const swCode = `self.addEventListener('install', e => e.waitUntil(caches.open('do-v1').then(c => c.addAll(['/','/index.html']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url);
        }
    </script>
</body>
</html>
