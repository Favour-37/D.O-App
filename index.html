<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#7C4DFF">
    <title>Dominion Outreach – The Ultimate App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dxiefklmt/image/upload/q_auto,f_auto/v1774102552/Dominion_Outreach_ft0cc0.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F7;
            --bg-dark: #000000;
            --surface-dark: #1C1C1E;
            --text: #1D1C1E;
            --text-secondary: #86868B;
            --primary: #7C4DFF;
            --primary-light: #B47CFF;
            --secondary: #00C9A7;
            --accent: #FF6B6B;
            --border: rgba(0,0,0,0.05);
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 32px rgba(0,0,0,0.1);
            --radius: 24px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body.dark {
            --bg: #000000;
            --surface: #1C1C1E;
            --text: #FFFFFF;
            --text-secondary: #98989D;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }
        .app-header {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        body.dark .app-header {
            background: rgba(0,0,0,0.8);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
        }
        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
        }
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border-radius: 48px;
            padding: 40px 24px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .login-buttons {
            display: flex;
            gap: 20px;
            margin-top: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .login-btn {
            flex: 1;
            background: var(--primary);
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn.secondary {
            background: var(--secondary);
        }
        .login-input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            margin-bottom: 16px;
        }
        .hidden {
            display: none;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            z-index: 100;
        }
        .tab-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .tab-btn i {
            font-size: 1.4rem;
        }
        .tab-btn.active {
            color: var(--primary);
            background: rgba(124,77,255,0.1);
        }
        .main-content {
            padding: 20px 16px 80px;
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin: 12px 0;
        }
        .post-media img, .post-media video {
            width: 100%;
        }
        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            color: var(--text-secondary);
        }
        .post-stats button {
            background: none;
            border: none;
            color: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .comment-section {
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .comment-input input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        button {
            background: var(--primary);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <img src="https://res.cloudinary.com/dxiefklmt/image/upload/q_auto,f_auto/v1774102552/Dominion_Outreach_ft0cc0.png" width="80" style="border-radius: 20px; margin-bottom: 20px;">
        <h2>Dominion Outreach</h2>
        <p style="margin-bottom: 24px;">Raising a Generation of Intimacy</p>
        <div class="login-buttons">
            <button id="adminLoginBtn" class="login-btn">👑 Admin Login</button>
            <button id="memberJoinBtn" class="login-btn secondary">🙏 Join as Disciple</button>
        </div>
        <div id="adminLoginForm" class="hidden" style="margin-top: 24px;">
            <input type="email" id="adminEmail" placeholder="Email" class="login-input">
            <input type="password" id="adminPassword" placeholder="Password" class="login-input">
            <button id="submitAdminLogin">Sign in</button>
            <div id="loginError" style="color: red; margin-top: 12px;"></div>
        </div>
    </div>
</div>

<!-- Main App (hidden until login) -->
<div id="appContainer" class="hidden">
    <div class="app-header">
        <div class="logo-area">
            <img src="https://res.cloudinary.com/dxiefklmt/image/upload/q_auto,f_auto/v1774102552/Dominion_Outreach_ft0cc0.png" class="logo-img">
            <span class="app-title">Dominion Outreach</span>
        </div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>

    <div class="main-content" id="mainContent"></div>

    <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="tab-btn" data-tab="feed"><i class="fas fa-newspaper"></i><span>Feed</span></button>
        <button class="tab-btn" data-tab="prayer"><i class="fas fa-hands-praying"></i><span>Prayer</span></button>
        <button class="tab-btn" data-tab="journal"><i class="fas fa-book"></i><span>Journal</span></button>
        <button id="adminTabBtn" class="tab-btn" style="display: none;" data-tab="admin"><i class="fas fa-user-shield"></i><span>Admin</span></button>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

<script>
    // -------------------- FIREBASE CONFIG (REPLACE WITH YOUR OWN) --------------------
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    // Cloudinary (unsigned upload preset for admin posts)
    const CLOUD_NAME = "dxiefklmt";
    const UPLOAD_PRESET = "dominion_app";

    // Global state
    let currentUser = null;
    let isAdmin = false;
    let currentTab = 'home';
    let postsUnsub = null;
    let prayersUnsub = null;

    // DOM elements
    const loginScreen = document.getElementById('loginScreen');
    const appContainer = document.getElementById('appContainer');
    const adminLoginForm = document.getElementById('adminLoginForm');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const memberJoinBtn = document.getElementById('memberJoinBtn');
    const submitAdminLogin = document.getElementById('submitAdminLogin');
    const adminTabBtn = document.getElementById('adminTabBtn');
    const themeToggle = document.getElementById('themeToggle');

    // -------------------- Helper Functions --------------------
    function setTheme(theme) {
        if (theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        localStorage.setItem('theme', theme);
        themeToggle.querySelector('i').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
    const savedTheme = localStorage.getItem('theme');
    setTheme(savedTheme === 'dark' ? 'dark' : 'light');
    themeToggle.addEventListener('click', () => {
        const isDark = document.body.classList.contains('dark');
        setTheme(isDark ? 'light' : 'dark');
    });

    // Escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // -------------------- Authentication --------------------
    adminLoginBtn.addEventListener('click', () => {
        adminLoginForm.classList.toggle('hidden');
    });

    memberJoinBtn.addEventListener('click', async () => {
        // Create anonymous user with a random email (so they can have a UID)
        const randomEmail = `user_${Date.now()}@dominion.local`;
        const randomPassword = Math.random().toString(36).slice(-10);
        try {
            const cred = await auth.createUserWithEmailAndPassword(randomEmail, randomPassword);
            // Also store a custom claim or Firestore doc to mark as member (optional)
            await db.collection('users').doc(cred.user.uid).set({ role: 'member', email: randomEmail });
            alert('Welcome, Disciple! You are now part of the community.');
        } catch (err) {
            alert('Error: ' + err.message);
        }
    });

    submitAdminLogin.addEventListener('click', async () => {
        const email = document.getElementById('adminEmail').value;
        const pwd = document.getElementById('adminPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
        } catch (err) {
            document.getElementById('loginError').innerText = err.message;
        }
    });

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            // Check if admin (emails match)
            const adminEmails = ['favourbaraka1@gmail.com', 'barakafavor37@gmail.com'];
            isAdmin = adminEmails.includes(user.email);
            // Hide login screen, show app
            loginScreen.style.display = 'none';
            appContainer.classList.remove('hidden');
            // Show/hide admin tab
            adminTabBtn.style.display = isAdmin ? 'flex' : 'none';
            // Load home tab by default
            switchTab('home');
            // Start realtime listeners
            startListeners();
            // Request notification permission for members (optional)
            if (!isAdmin && 'Notification' in window) {
                Notification.requestPermission();
            }
        } else {
            loginScreen.style.display = 'flex';
            appContainer.classList.add('hidden');
            if (postsUnsub) postsUnsub();
            if (prayersUnsub) prayersUnsub();
        }
    });

    // -------------------- Firestore Listeners --------------------
    function startListeners() {
        if (postsUnsub) postsUnsub();
        postsUnsub = db.collection('posts').orderBy('timestamp', 'desc').limit(30).onSnapshot(() => {
            if (currentTab === 'feed') renderFeed();
        });
        if (prayersUnsub) prayersUnsub();
        prayersUnsub = db.collection('prayers').orderBy('timestamp', 'desc').onSnapshot(() => {
            if (currentTab === 'prayer') renderPrayerWall();
        });
    }

    // -------------------- Render Functions --------------------
    async function renderHome() {
        // Get daily devotional from Firestore (or local fallback)
        const doc = await db.collection('settings').doc('dailyVerse').get();
        let verse = { ref: 'Psalm 118:24', text: 'This is the day the Lord has made; let us rejoice and be glad in it.' };
        if (doc.exists) verse = doc.data();
        const html = `
            <div class="card">
                <h3>📖 Daily Verse</h3>
                <p style="font-style: italic; margin: 12px 0;">“${escapeHtml(verse.text)}”</p>
                <p style="text-align: right;">— ${escapeHtml(verse.ref)}</p>
            </div>
            <div class="card">
                <h3>🙏 Word of Encouragement</h3>
                <p>You are chosen, loved, and never alone. God is doing a new thing in you.</p>
            </div>
            <div class="card">
                <h3>🎶 Worship Moment</h3>
                <p><i class="fas fa-headphones"></i> “Gratitude” – Brandon Lake</p>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    async function renderFeed() {
        const snapshot = await db.collection('posts').orderBy('timestamp', 'desc').limit(30).get();
        if (snapshot.empty) {
            document.getElementById('mainContent').innerHTML = '<div class="card">No posts yet. Admin will share devotionals soon.</div>';
            return;
        }
        let html = '';
        snapshot.forEach(doc => {
            const p = doc.data();
            const mediaHtml = p.mediaUrl ? (p.mediaType === 'image' ? `<div class="post-media"><img src="${p.mediaUrl}" loading="lazy"></div>` :
                `<div class="post-media"><video controls src="${p.mediaUrl}"></video></div>`) : '';
            html += `
                <div class="card" data-id="${doc.id}">
                    <h3>${escapeHtml(p.title)}</h3>
                    <div style="font-size:0.75rem; color:var(--text-secondary);">${new Date(p.timestamp?.toDate()).toLocaleDateString()}</div>
                    <div style="margin: 12px 0;">${escapeHtml(p.content)}</div>
                    ${mediaHtml}
                    <div class="post-stats">
                        <button class="like-post" data-id="${doc.id}"><i class="far fa-heart"></i> ${p.likes || 0}</button>
                        <button class="comment-toggle" data-id="${doc.id}"><i class="far fa-comment"></i> ${(p.comments || []).length}</button>
                    </div>
                    <div class="comment-section hidden" id="comments-${doc.id}">
                        <div id="commentsList-${doc.id}">${(p.comments || []).map(c => `<div class="comment"><strong>${escapeHtml(c.name)}</strong>: ${escapeHtml(c.text)}</div>`).join('')}</div>
                        <div class="comment-input">
                            <input type="text" id="commentInput-${doc.id}" placeholder="Write a comment...">
                            <button class="submit-comment" data-id="${doc.id}">Post</button>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('mainContent').innerHTML = html;
        attachFeedEvents();
    }

    function attachFeedEvents() {
        document.querySelectorAll('.like-post').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const postRef = db.collection('posts').doc(id);
                await postRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            });
        });
        document.querySelectorAll('.comment-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const sec = document.getElementById(`comments-${id}`);
                sec.classList.toggle('hidden');
            });
        });
        document.querySelectorAll('.submit-comment').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const input = document.getElementById(`commentInput-${id}`);
                const text = input.value.trim();
                if (!text) return;
                const name = currentUser.email?.split('@')[0] || 'Disciple';
                const comment = { name, text, timestamp: new Date().toISOString() };
                const postRef = db.collection('posts').doc(id);
                await postRef.update({ comments: firebase.firestore.FieldValue.arrayUnion(comment) });
                input.value = '';
            });
        });
    }

    async function renderPrayerWall() {
        const snapshot = await db.collection('prayers').orderBy('timestamp', 'desc').get();
        let html = `
            <div class="card">
                <h3>🕯️ Submit a Prayer Request</h3>
                <input type="text" id="prayerName" placeholder="Your name (optional)">
                <textarea id="prayerText" rows="3" placeholder="What can we pray about?"></textarea>
                <button id="submitPrayer">Submit</button>
            </div>
            <div id="prayerList"></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        const listDiv = document.getElementById('prayerList');
        if (snapshot.empty) {
            listDiv.innerHTML = '<div class="card">No prayer requests yet. Be the first.</div>';
        } else {
            let prayersHtml = '';
            snapshot.forEach(doc => {
                const p = doc.data();
                prayersHtml += `
                    <div class="card">
                        <div><strong>${escapeHtml(p.name) || 'Anonymous'}</strong></div>
                        <p>${escapeHtml(p.text)}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                            <span style="font-size:0.75rem;">${new Date(p.timestamp?.toDate()).toLocaleDateString()}</span>
                            <button class="pray-for" data-id="${doc.id}">🙏 Prayed (${p.prayCount || 0})</button>
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = prayersHtml;
        }
        document.getElementById('submitPrayer')?.addEventListener('click', async () => {
            const name = document.getElementById('prayerName').value.trim();
            const text = document.getElementById('prayerText').value.trim();
            if (!text) return;
            await db.collection('prayers').add({
                name: name || 'Anonymous',
                text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                prayCount: 0
            });
            document.getElementById('prayerText').value = '';
        });
        document.querySelectorAll('.pray-for').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                await db.collection('prayers').doc(id).update({ prayCount: firebase.firestore.FieldValue.increment(1) });
            });
        });
    }

    // Journal (private per user – stored in Firestore subcollection)
    async function renderJournal() {
        const user = auth.currentUser;
        if (!user) return;
        const snapshot = await db.collection('users').doc(user.uid).collection('journal').orderBy('timestamp', 'desc').get();
        let html = `
            <div class="card">
                <h3>📔 Personal Journal</h3>
                <input type="text" id="journalTitle" placeholder="Title">
                <textarea id="journalContent" rows="4" placeholder="Write your thoughts, prayers..."></textarea>
                <button id="addJournalEntry">Save Entry</button>
            </div>
            <div id="journalList"></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        const listDiv = document.getElementById('journalList');
        if (snapshot.empty) {
            listDiv.innerHTML = '<div class="card">No journal entries yet. Start writing!</div>';
        } else {
            let entriesHtml = '';
            snapshot.forEach(doc => {
                const entry = doc.data();
                entriesHtml += `
                    <div class="card">
                        <h3>${escapeHtml(entry.title)}</h3>
                        <div style="font-size:0.75rem;">${new Date(entry.timestamp?.toDate()).toLocaleString()}</div>
                        <p>${escapeHtml(entry.content)}</p>
                        <button class="delete-journal" data-id="${doc.id}" style="background: none; color: var(--text-secondary);">Delete</button>
                    </div>
                `;
            });
            listDiv.innerHTML = entriesHtml;
        }
        document.getElementById('addJournalEntry')?.addEventListener('click', async () => {
            const title = document.getElementById('journalTitle').value.trim();
            const content = document.getElementById('journalContent').value.trim();
            if (!title || !content) return alert('Please fill both');
            await db.collection('users').doc(user.uid).collection('journal').add({
                title, content, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            renderJournal();
        });
        document.querySelectorAll('.delete-journal').forEach(btn => {
            btn.addEventListener('click', async () => {
                await db.collection('users').doc(user.uid).collection('journal').doc(btn.dataset.id).delete();
                renderJournal();
            });
        });
    }

    // Admin Panel
    async function renderAdmin() {
        let html = `
            <div class="card">
                <h3>✍️ Post New Devotional</h3>
                <input type="text" id="postTitle" placeholder="Title">
                <textarea id="postContent" rows="4" placeholder="Scripture / Reflection"></textarea>
                <input type="file" id="postMedia" accept="image/*,video/*">
                <button id="publishPostBtn">Publish Post</button>
                <div id="uploadStatus"></div>
            </div>
            <div id="adminPostsList"></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        const postsSnapshot = await db.collection('posts').orderBy('timestamp', 'desc').get();
        let postsHtml = '<h3>Manage Posts</h3>';
        postsSnapshot.forEach(doc => {
            const p = doc.data();
            postsHtml += `
                <div class="card">
                    <strong>${escapeHtml(p.title)}</strong> – ${new Date(p.timestamp?.toDate()).toLocaleDateString()}
                    <button class="delete-post" data-id="${doc.id}" style="background: #FF3B30; margin-top: 8px;">Delete Post</button>
                </div>
            `;
        });
        document.getElementById('adminPostsList').innerHTML = postsHtml;

        document.getElementById('publishPostBtn')?.addEventListener('click', async () => {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!title || !content) return alert('Title and content required');
            const file = document.getElementById('postMedia').files[0];
            let mediaUrl = null, mediaType = null;
            const statusDiv = document.getElementById('uploadStatus');
            if (file) {
                statusDiv.innerText = 'Uploading media...';
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    mediaUrl = data.secure_url;
                    mediaType = file.type.startsWith('image/') ? 'image' : 'video';
                    statusDiv.innerText = 'Upload complete!';
                } catch (err) {
                    statusDiv.innerText = 'Upload failed';
                }
            }
            await db.collection('posts').add({
                title, content, mediaUrl, mediaType,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0,
                comments: []
            });
            alert('Post published!');
            renderAdmin();
        });
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Delete this post?')) await db.collection('posts').doc(btn.dataset.id).delete();
                renderAdmin();
            });
        });
    }

    // Tab Switching
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
        if (tab === 'home') await renderHome();
        else if (tab === 'feed') await renderFeed();
        else if (tab === 'prayer') await renderPrayerWall();
        else if (tab === 'journal') await renderJournal();
        else if (tab === 'admin' && isAdmin) await renderAdmin();
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Service Worker for offline & installability
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install', e => e.waitUntil(caches.open('do-v1').then(c => c.addAll(['/','/index.html']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const url = URL.createObjectURL(blob);
        navigator.serviceWorker.register(url);
    }
</script>
</body>
</html>
